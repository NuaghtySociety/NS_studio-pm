  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

mary light surface *\u002f\n  --ns-ink:        #000000;   \u002f* primary dark surface \u002f max foreground *\u002f\n  --ns-stage:      #1A1A1A;   \u002f* dark stage background (.dark sections) *\u002f\n  --ns-well-dark:  #0A0A0A;   \u002f* deep well on dark *\u002f\n  --ns-ph-dark:    #1F1F1F;   \u002f* image placeholder on dark *\u002f\n  --ns-ph:         #ECECEC;   \u002f* image placeholder on light *\u002f\n  --ns-ph-soft:    #F2F2F2;   \u002f* image well on light *\u002f\n\n  \u002f* \u2014 Hairline \u2014 the only rule weight in the system \u2014 *\u002f\n  --rule:          rgba(0,0,0,0.16);\n  --rule-strong:   rgba(0,0,0,0.32);\n\n  \u002f* \u2014 Ink ramp \u2014 foreground on PAPER \u2014\n     body = 78% \u00b7 mono labels = 55% \u00b7 index = 50% \u00b7 \"us\" tint = 4% *\u002f\n  --ink:      #000000;             \u002f* 100% *\u002f\n  --ink-85:   rgba(0,0,0,0.85);\n  --ink-78:   rgba(0,0,0,0.78);    \u002f* body *\u002f\n  --ink-70:   rgba(0,0,0,0.70);\n  --ink-60:   rgba(0,0,0,0.60);\n  --ink-55:   rgba(0,0,0,0.55);    \u002f* mono labels *\u002f\n  --ink-50:   rgba(0,0,0,0.50);    \u002f* index *\u002f\n  --ink-45:   rgba(0,0,0,0.45);\n  --ink-40:   rgba(0,0,0,0.40);\n  --ink-16:   rgba(0,0,0,0.16);    \u002f* = rule *\u002f\n  --ink-12:   rgba(0,0,0,0.12);\n  --ink-04:   rgba(0,0,0,0.04);    \u002f* \"us\" \u002f highlight tint *\u002f\n\n  \u002f* \u2014 Paper ramp \u2014 foreground on INK (.dark surfaces) \u2014\n     body = 78% \u00b7 mono = 55% \u00b7 hairline = 18% *\u002f\n  --paper:        #FFFFFF;         \u002f* 100% *\u002f\n  --paper-85:     rgba(255,255,255,0.85);\n  --paper-78:     rgba(255,255,255,0.78);   \u002f* body on dark *\u002f\n  --paper-65:     rgba(255,255,255,0.65);\n  --paper-55:     rgba(255,255,255,0.55);   \u002f* mono on dark *\u002f\n  --paper-40:     rgba(255,255,255,0.40);\n  --paper-30:     rgba(255,255,255,0.30);\n  --rule-dark-strong: rgba(255,255,255,0.32);\n  --rule-dark:    rgba(255,255,255,0.18);   \u002f* hairline on dark *\u002f\n\n  \u002f* \u2014 Semantic aliases \u2014 *\u002f\n  --bg:        var(--ns-paper);\n  --fg:        var(--ink);\n  --fg-body:   var(--ink-78);\n  --fg-mono:   var(--ink-55);\n  --fg-index:  var(--ink-50);\n  --bg-dark:   var(--ns-stage);\n  --fg-on-dark:      var(--paper);\n  --fg-body-on-dark: var(--paper-78);\n  --fg-mono-on-dark: var(--paper-55);\n\n  \u002f* =========================================================\n     02 \u002f TYPE\n     ========================================================= *\u002f\n  --font-display:  \"Archivo\", \"Arial Narrow\", sans-serif;\n  --font-serif:    \"Instrument Serif\", Georgia, serif;   \u002f* emphasis only *\u002f\n  --font-mono:     \"JetBrains Mono\", ui-monospace, SFMono-Regular, monospace;\n\n  --display-stretch: 87.5%;     \u002f* Archivo width axis for display *\u002f\n  --display-track:  -0.025em;\n  --serif-track:    -0.005em;\n\n  \u002f* \u2014 Display scale \u2014 authored at 1920\u00d71080 \u2014\n     never below 36px display \u00b7 never below 9px mono \u2014 *\u002f\n  --t-marquee:     200px;   \u002f* \"Naughty society\" *\u002f\n  --t-display-xl:  160px;\n  --t-hero:        132px;\n  --t-display:     110px;\n  --t-h2-lg:        88px;\n  --t-h2-sm:        72px;\n  --t-h3-lg:        48px;\n  --t-h3-sm:        36px;   \u002f* display floor *\u002f\n  --t-lead:         32px;   \u002f* serif lead *\u002f\n  --t-body-xl:      22px;\n  --t-body:         18px;\n  --t-mono-lg:      12px;\n  --t-mono:         11px;\n  --t-mono-sm:      10px;\n  --t-mono-floor:    9px;   \u002f* mono floor *\u002f\n\n  \u002f* =========================================================\n     SPACING \u2014 slide chrome insets + grid\n     ========================================================= *\u002f\n  --inset-slide:   64px;    \u002f* corner-label inset, large *\u002f\n  --inset-tight:   44px;    \u002f* corner-label inset, dense *\u002f\n  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;\n  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;\n  --s-9: 96px; --s-10: 128px;\n\n  \u002f* \u2014 Radius \u2014 hard corners only; pill is the single exception \u2014 *\u002f\n  --r-0: 0;                \u002f* @kind radius *\u002f\n  --r-pill: 999px;\n\n  \u002f* \u2014 Edge stripe \u2014 4px barcode device pinned to slide foot \u2014 *\u002f\n  --edge-stripe: 4px;\n\n  \u002f* \u2014 Motion \u2014 restrained \u2014 *\u002f\n  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);   \u002f* @kind other *\u002f\n  --dur: 200ms;                             \u002f* @kind other *\u002f\n}\n\n\u002f* =========================================================\n   BASE\n   ========================================================= *\u002f\nhtml, body {\n  background: var(--bg);\n  color: var(--fg);\n  font-family: var(--font-display);\n  font-size: var(--t-body);\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n\u002f* \u2014 Display: Archivo, condensed, tight. The default voice. \u2014 *\u002f\n.t-marquee, .t-display-xl, .t-hero, .t-display,\nh1, h2, h3, .h1, .h2, .h3 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-stretch: var(--display-stretch);\n  letter-spacing: var(--display-track);\n  line-height: 0.92;\n  margin: 0;\n  color: var(--fg);\n  text-wrap: balance;\n}\n.t-marquee    { font-size: var(--t-marquee);    line-height: 0.9; }\n.t-display-xl { font-size: var(--t-display-xl); }\n.t-hero       { font-size: var(--t-hero); }\n.t-display    { font-size: var(--t-display); }\nh1, .h1       { font-size: var(--t-h2-lg); }\nh2, .h2       { font-size: var(--t-h2-sm); }\nh3, .h3       { font-size: var(--t-h3-lg); line-height: 1.0; }\n.t-h3-sm      { font-size: var(--t-h3-sm); }\n\n\u002f* \u2014 Emphasis: Instrument Serif italic. ONLY inside <em> \u002f pull quotes. \u2014 *\u002f\nem, .serif, .lead {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-weight: 400;\n  letter-spacing: var(--serif-track);\n}\n.lead { font-size: var(--t-lead); line-height: 1.2; display: block; }\n\n\u002f* \u2014 Body: Archivo at natural width, small and tight against display. \u2014 *\u002f\np, .body {\n  font-family: var(--font-display);\n  font-stretch: 100%;\n  font-weight: 400;\n  font-size: var(--t-body);\n  line-height: 1.5;\n  color: var(--fg-body);\n  margin: 0;\n  text-wrap: pretty;\n}\n.body-xl { font-size: var(--t-body-xl); }\n\n\u002f* \u2014 Mono: chrome. Uppercase, wide tracking. Labels, numbers, page nums. \u2014 *\u002f\n.mono, .eyebrow, .label, code, kbd, samp {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: var(--t-mono);\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--fg-mono);\n}\n.mono-wide { letter-spacing: 0.32em; }\n.eyebrow::before { content: \"\u2014 \"; }\n\n\u002f* \u2014 Hairline rule \u2014 the only divider \u2014 *\u002f\nhr, .rule {\n  border: 0;\n  border-top: 1px solid var(--rule);\n  margin: 0;\n}\n\na { color: inherit; text-decoration: none; }\n::selection { background: var(--ink); color: var(--paper); }\n\n\u002f* =========================================================\n   DARK SURFACES \u2014 paper-on-ink. Add .dark to any section.\n   ========================================================= *\u002f\n.dark {\n  background: var(--ns-stage);\n  color: var(--paper);\n}\n.dark p, .dark .body { color: var(--fg-body-on-dark); }\n.dark .mono, .dark .eyebrow, .dark .label { color: var(--fg-mono-on-dark); }\n.dark hr, .dark .rule { border-top-color: var(--rule-dark); }\n\n\u002f* =========================================================\n   PILL \u2014 the one rounded element. Uppercase mono, hairline border.\n   ========================================================= *\u002f\n.pill {\n  display: inline-flex;\n  align-items: center;\n  font-family: var(--font-mono);\n  font-size: var(--t-mono);\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-78);\n  padding: 7px 16px;\n  border: 1px solid var(--rule);\n  border-radius: var(--r-pill);\n  background: transparent;\n}\n.dark .pill { color: var(--paper-85); border-color: var(--rule-dark); }\n.pill.solid { background: var(--ink); color: var(--paper); border-color: var(--ink); }\n\n\u002f* =========================================================\n   IMAGE PLACEHOLDER \u2014 diagonal-cross device.\n   Holds the frame until real renders drop in.\n   ========================================================= *\u002f\n.ph {\n  position: relative;\n  background: var(--ns-ph-soft);\n  border: 1px solid var(--rule);\n  overflow: hidden;\n}\n.ph::before, .ph::after {\n  content: \"\";\n  position: absolute;\n  inset: -1px;\n  pointer-events: none;\n}\n.ph::before {\n  background:\n    linear-gradient(to top right, transparent calc(50% - 0.5px), var(--rule) 50%, transparent calc(50% + 0.5px)),\n    linear-gradient(to bottom right, transparent calc(50% - 0.5px), var(--rule) 50%, transparent calc(50% + 0.5px));\n}\n.ph.dark, .dark .ph {\n  background: var(--ns-ph-dark);\n  border-color: var(--rule-dark);\n}\n.dark .ph::before {\n  background:\n    linear-gradient(to top right, transparent calc(50% - 0.5px), var(--rule-dark) 50%, transparent calc(50% + 0.5px)),\n    linear-gradient(to bottom right, transparent calc(50% - 0.5px), var(--rule-dark) 50%, transparent calc(50% + 0.5px));\n}\n\n\u002f* =========================================================\n   EDGE STRIPE \u2014 4px barcode device pinned to a slide foot.\n   ========================================================= *\u002f\n.edge-stripe {\n  height: var(--edge-stripe);\n  width: 100%;\n  background-image: repeating-linear-gradient(\n    90deg,\n    var(--ink) 0, var(--ink) 2px,\n    transparent 2px, transparent 5px,\n    var(--ink) 5px, var(--ink) 6px,\n    transparent 6px, transparent 12px,\n    var(--ink) 12px, var(--ink) 15px,\n    transparent 15px, transparent 18px\n  );\n}\n.dark .edge-stripe { background-image: repeating-linear-gradient(\n    90deg,\n    var(--paper) 0, var(--paper) 2px,\n    transparent 2px, transparent 5px,\n    var(--paper) 5px, var(--paper) 6px,\n    transparent 6px, transparent 12px,\n    var(--paper) 12px, var(--paper) 15px,\n    transparent 15px, transparent 18px\n  );\n}\n<\u002fstyle>\n  <script src=\"89a3b82e-5eda-4bd4-83a5-e96f30c723b2\"><\u002fscript>\n  <style>\n    html, body { margin: 0; padding: 0; background: #fff; }\n    * { box-sizing: border-box; }\n    ::-webkit-scrollbar { width: 8px; height: 8px; }\n    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.22); }\n    ::-webkit-scrollbar-track { background: transparent; }\n    @keyframes panelIn { from { transform: translateX(28px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }\n    input::placeholder, textarea::placeholder { color: rgba(0,0,0,0.3); }\n  <\u002fstyle>\n<\u002fhelmet>\n\n<sc-if value=\"{{ needsAuth }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;align-items:center;justify-content:center;width:100%;height:100vh;background:#fff;font-family:'Archivo',sans-serif;\">\n    <div style=\"width:380px;\">\n      <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(0,0,0,.45);\">NAUGHTY \u002f SOCIETY<\u002fdiv>\n      <div style=\"font-family:var(--font-display);font-weight:700;font-stretch:87.5%;letter-spacing:-0.03em;line-height:0.95;font-size:48px;margin-top:10px;color:#000;\">Studio PM.<\u002fdiv>\n      <div style=\"display:flex;gap:18px;margin-top:28px;border-bottom:1px solid rgba(0,0,0,.16);\">\n        <div onclick=\"{{ goToSignin }}\" style=\"{{ signinTabStyle }}\">Sign In<\u002fdiv>\n        <div onclick=\"{{ goToSignup }}\" style=\"{{ signupTabStyle }}\">Create Account<\u002fdiv>\n      <\u002fdiv>\n      <div style=\"margin-top:26px;\">\n        <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.5);\">EMAIL<\u002fdiv>\n        <input type=\"email\" value=\"{{ authEmail }}\" onchange=\"{{ updateAuthEmail }}\" placeholder=\"you@studio.com\" style=\"width:100%;font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:16px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:8px 0;margin-top:6px;outline:none;background:transparent;color:#000;\">\n      <\u002fdiv>\n      <div style=\"margin-top:18px;\">\n        <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.5);\">PASSWORD<\u002fdiv>\n        <input type=\"password\" value=\"{{ authPassword }}\" onchange=\"{{ updateAuthPassword }}\" placeholder=\"\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\" style=\"width:100%;font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:16px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:8px 0;margin-top:6px;outline:none;background:transparent;color:#000;\">\n      <\u002fdiv>\n      <sc-if value=\"{{ hasAuthError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.04em;color:rgba(0,0,0,.6);margin-top:14px;line-height:1.5;\">{{ authError }}<\u002fdiv>\n      <\u002fsc-if>\n      <div onclick=\"{{ submitAuth }}\" style=\"margin-top:24px;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:12px 18px;background:#000;color:#fff;cursor:pointer;text-align:center;\">{{ authSubmitLabel }}<\u002fdiv>\n      <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;color:rgba(0,0,0,.35);margin-top:20px;line-height:1.6;\">Shared team workspace \u2014 sign in with your own email. Everyone on the team sees the same live board.<\u002fdiv>\n    <\u002fdiv>\n  <\u002fdiv>\n<\u002fsc-if>\n\n<sc-if value=\"{{ hasSession }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;width:100%;height:100vh;background:#fff;overflow:hidden;font-family:'Archivo',sans-serif;\">\n\n  <!-- ============ RAIL \u2014 DARK ============ -->\n  <sc-if value=\"{{ railIsDark }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"width:250px;flex:none;height:100%;background:#1A1A1A;display:flex;flex-direction:column;overflow-y:auto;\">\n      <div style=\"padding:28px 24px 22px;\">\n        <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.55);\">NAUGHTY \u002f SOCIETY<\u002fdiv>\n        <div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#fff;margin-top:8px;\">\u2014 STUDIO PM<\u002fdiv>\n      <\u002fdiv>\n      <div style=\"border-top:1px solid rgba(255,255,255,.18);\"><\u002fdiv>\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n        <div onclick=\"{{ item.onClick }}\" style=\"padding:18px 24px;border-bottom:1px solid rgba(255,255,255,.12);cursor:pointer;\">\n          <sc-if value=\"{{ item.active }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.6);\">\u2014 {{ item.index }}<\u002fdiv>\n            <div style=\"font-family:var(--font-display);font-weight:700;font-stretch:87.5%;letter-spacing:-0.02em;line-height:1;font-size:26px;color:#fff;margin-top:6px;\">{{ item.label }}<\u002fdiv>\n          <\u002fsc-if>\n          <sc-if value=\"{{ item.notActive }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.3);\">\u2014 {{ item.index }}<\u002fdiv>\n            <div style=\"font-family:var(--font-display);font-weight:700;font-stretch:87.5%;letter-spacing:-0.02em;line-height:1;font-size:26px;color:rgba(255,255,255,.4);margin-top:6px;\">{{ item.label }}<\u002fdiv>\n          <\u002fsc-if>\n        <\u002fdiv>\n      <\u002fsc-for>\n      <div style=\"flex:1;\"><\u00 e }}\">\n        <div style=\"padding:36px 56px 40px;\">\n          <div style=\"display:flex;padding-left:210px;margin-bottom:10px;\">\n            <sc-for list=\"{{ phaseLegend }}\" as=\"p\" hint-placeholder-count=\"7\">\n              <div style=\"flex:1;font-family:var(--font-mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.5);padding-right:8px;\">\u2014 {{ p.index }} {{ p.name }}<\u002fdiv>\n            <\u002fsc-for>\n          <\u002fdiv>\n          <sc-for list=\"{{ timelineRows }}\" as=\"row\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:center;padding:22px 0;border-top:1px solid rgba(0,0,0,.16);\">\n              <div style=\"width:210px;flex:none;display:flex;align-items:center;gap:9px;\">\n                <span style=\"width:10px;height:10px;background:{{ row.color }};display:inline-block;flex:none;\"><\u002fspan>\n                <div style=\"font-family:var(--font-display);font-weight:700;font-stretch:87.5%;font-size:22px;letter-spacing:-0.02em;color:#000;\">{{ row.name }}<\u002fdiv>\n              <\u002fdiv>\n              <div style=\"display:flex;flex:1;\">\n                <sc-for list=\"{{ row.segments }}\" as=\"seg\" hint-placeholder-count=\"7\">\n                  <div style=\"flex:1;height:30px;background:{{ seg.fill }};{{ seg.border }}\"><\u002fdiv>\n                <\u002fsc-for>\n              <\u002fdiv>\n            <\u002fdiv>\n          <\u002fsc-for>\n          <sc-if value=\"{{ showCategoryGrouping }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;padding-left:210px;margin-top:10px;\">\n              <div style=\"flex:3;font-family:var(--font-mono);font-size:8.5px;letter-spacing:.16em;color:rgba(0,0,0,.4);\">PRE-PRODUCTION<\u002fdiv>\n              <div style=\"flex:6;font-family:var(--font-mono);font-size:8.5px;letter-spacing:.16em;color:rgba(0,0,0,.4);\">IN PRODUCTION<\u002fdiv>\n              <div style=\"flex:1;font-family:var(--font-mono);font-size:8.5px;letter-spacing:.16em;color:rgba(0,0,0,.4);\">POST-PROD.<\u002fdiv>\n            <\u002fdiv>\n          <\u002fsc-if>\n        <\u002fdiv>\n      <\u002fsc-if>\n\n      <!-- DASHBOARD -->\n      <sc-if value=\"{{ isDashboardView }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:36px 56px 56px;\">\n          <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.5);margin-bottom:14px;\">\u2014 PHASE BREAKDOWN \u00b7 ALL PROJECTS<\u002fdiv>\n          <div style=\"display:flex;border:1px solid #000;height:110px;\">\n            <sc-for list=\"{{ dashboardSegments }}\" as=\"s\" hint-placeholder-count=\"7\">\n              <div style=\"flex:{{ s.count }} 1 0;border-right:1px solid rgba(255,255,255,.5);background:{{ s.fill }};display:flex;align-items:flex-end;padding:10px;\">\n                <span style=\"font-family:var(--font-mono);font-size:8.5px;letter-spacing:.1em;color:{{ s.labelColor }};\">\u2014 {{ s.index }}<\u002fspan>\n              <\u002fdiv>\n            <\u002fsc-for>\n          <\u002fdiv>\n          <div style=\"display:flex;margin-top:0;margin-bottom:48px;\">\n            <sc-for list=\"{{ dashboardSegments }}\" as=\"s\" hint-placeholder-count=\"7\">\n              <div style=\"flex:1;padding:14px 10px 0 0;\">\n                <div style=\"font-family:var(--font-display);font-weight:700;font-stretch:87.5%;font-size:42px;letter-spacing:-0.02em;color:#000;\">{{ s.count }}<\u002fdiv>\n                <div style=\"font-family:var(--font-mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.5);margin-top:6px;line-height:1.4;\">{{ s.name }}<\u002fdiv>\n              <\u002fdiv>\n            <\u002fsc-for>\n          <\u002fdiv>\n\n          <div style=\"border-top:1px solid rgba(0,0,0,.16);padding-top:30px;\">\n            <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.5);margin-bottom:20px;\">\u2014 PROJECTS IN FLIGHT<\u002fdiv>\n            <div style=\"display:flex;gap:56px;flex-wrap:wrap;\">\n              <sc-for list=\"{{ projectCards }}\" as=\"pc\" hint-placeholder-count=\"2\">\n                <div style=\"flex:none;width:320px;border-top:3px solid {{ pc.color }};padding-top:16px;\">\n                  <div style=\"display:flex;align-items:center;gap:8px;\">\n                    <span style=\"width:9px;height:9px;background:{{ pc.color }};display:inline-block;flex:none;\"><\u002fspan>\n                    <div style=\"font-family:var(--font-mono);font-size:9px;color:rgba(0,0,0,.5);\">\u2014 {{ pc.index }}<\u002fdiv>\n                  <\u002fdiv>\n                  <div style=\"font-family:var(--font-display);font-weight:700;font-stretch:87.5%;font-size:28px;letter-spacing:-0.02em;color:#000;margin-top:6px;\">{{ pc.name }}<\u002fdiv>\n                  <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:12px;\">\n                    <div>\n                      <div style=\"font-family:var(--font-mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.4);\">BASE MODEL<\u002fdiv>\n                      <div style=\"font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:14px;color:#000;margin-top:3px;\">{{ pc.baseModel }}<\u002fdiv>\n                    <\u002fdiv>\n                    <div>\n                      <div style=\"font-family:var(--font-mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.4);\">TRAINED LORA PATH<\u002fdiv>\n                      <div style=\"font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:14px;color:#000;margin-top:3px;word-break:break-all;\">{{ pc.loraPath }}<\u002fdiv>\n                    <\u002fdiv>\n                    <div>\n                      <div style=\"font-family:var(--font-mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.4);\">GENERATION TOOL<\u002fdiv>\n                      <div style=\"font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:14px;color:#000;margin-top:3px;\">{{ pc.generationTool }}<\u002fdiv>\n                    <\u002fdiv>\n                    <div>\n                      <div style=\"font-family:var(--font-mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.4);\">TARGET DELIVERABLE<\u002fdiv>\n                      <div style=\"font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:14px;color:#000;margin-top:3px;\">{{ pc.targetFormat }}<\u002fdiv>\n                    <\u002fdiv>\n                  <\u002fdiv>\n                <\u002fdiv>\n              <\u002fsc-for>\n            <\u002fdiv>\n          <\u002fdiv>\n        <\u002fdiv>\n      <\u002fsc-if>\n\n      <!-- SETTINGS -->\n      <sc-if value=\"{{ isSettingsView }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:36px 56px 56px;overflow-y:auto;display:flex;flex-direction:column;gap:36px;height:100%;\">\n          \n          <!-- Columns Wrapper -->\n          <div style=\"display:flex;gap:48px;flex:none;\">\n            <!-- Left Column: Projects -->\n            <div style=\"flex:1;border-right:1px solid rgba(0,0,0,.16);padding-right:48px;\">\n              <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.5);margin-bottom:20px;\">\u2014 PROJECT MANAGEMENT<\u002fdiv>\n              \n              <sc-for list=\"{{ settingsProjects }}\" as=\"p\" hint-placeholder-count=\"2\">\n                <div style=\"border-bottom:1px solid rgba(0,0,0,.1);padding:14px 0;\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n                    <div style=\"display:flex;align-items:center;gap:8px;\">\n                      <span style=\"width:12px;height:12px;background:{{ p.color }};display:inline-block;\"><\u002fspan>\n                      <span style=\"font-family:var(--font-display);font-weight:700;font-size:18px;color:#000;\">{{ p.name }} ({{ p.id }})<\u002fspan>\n                    <\u002fdiv>\n                    <div onclick=\"{{ p.onDelete }}\" style=\"font-family:var(--font-mono);font-size:9.5px;color:rgba(0,0,0,.4);cursor:pointer;text-decoration:underline;\">DELETE<\u002fdiv>\n                  <\u002fdiv>\n                <\u002fdiv>\n              <\u002fsc-for>\n              \n              <!-- Add Project Form -->\n              <div style=\"margin-top:28px;background:rgba(0,0,0,.02);padding:20px;border:1px solid rgba(0,0,0,.1);\">\n                <div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.6);margin-bottom:12px;\">+ CREATE NEW PROJECT<\u002fdiv>\n                <div>\n                  <input value=\"{{ projectFormName }}\" onchange=\"{{ onProjectFormNameChange }}\" placeholder=\"Project Name (e.g., Adidas AW26)\" style=\"width:100%;font-family:var(--font-display);font-size:14px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:6px 0;margin-bottom:12px;outline:none;background:transparent;color:#000;\">\n                  <input value=\"{{ projectFormColor }}\" onchange=\"{{ onProjectFormColorChange }}\" placeholder=\"Color Hex (e.g., #C4653B)\" style=\"width:100%;font-family:var(--font-display);font-size:14px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:6px 0;margin-bottom:12px;outline:none;background:transparent;color:#000;\">\n                  <div onclick=\"{{ submitProjectForm }}\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;background:#000;color:#fff;cursor:pointer;text-align:center;\">ADD PROJECT<\u002fdiv>\n                <\u002fdiv>\n              <\u002fdiv>\n            <\u002fdiv>\n            \n            <!-- Right Column: Team Members -->\n            <div style=\"flex:1;\">\n              <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.5);margin-bottom:20px;\">\u2014 TEAM MANAGEMENT<\u002fdiv>\n              \n              <sc-for list=\"{{ settingsTeam }}\" as=\"tm\" hint-placeholder-count=\"5\">\n                <div style=\"border-bottom:1px solid rgba(0,0,0,.1);padding:14px 0;display:flex;justify-content:space-between;align-items:center;\">\n                  <div style=\"display:flex;align-items:center;gap:10px;\">\n                    <div style=\"width:24px;height:24px;border:1px solid #000;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700;color:#000;\">{{ tm.initials }}<\u002fdiv>\n                    <span style=\"font-family:var(--font-display);font-size:16px;color:#000;\">{{ tm.name }}<\u002fspan>\n                  <\u002fdiv>\n                  <div onclick=\"{{ tm.onDelete }}\" style=\"font-family:var(--font-mono);font-size:9.5px;color:rgba(0,0,0,.4);cursor:pointer;text-decoration:underline;\">DELETE<\u002fdiv>\n                <\u002fdiv>\n              <\u002fsc-for>\n              \n              <!-- Add Team Member Form -->\n              <div style=\"margin-top:28px;background:rgba(0,0,0,.02);padding:20px;border:1px solid rgba(0,0,0,.1);\">\n                <div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.6);margin-bottom:12px;\">+ ADD TEAM MEMBER<\u002fdiv>\n                <div>\n                  <input value=\"{{ teamFormName }}\" onchange=\"{{ onTeamFormNameChange }}\" placeholder=\"Full Name (e.g., John Doe)\" style=\"width:100%;font-family:var(--font-display);font-size:14px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:6px 0;margin-bottom:12px;outline:none;background:transparent;color:#000;\">\n                  <div onclick=\"{{ submitTeamForm }}\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;background:#000;color:#fff;cursor:pointer;text-align:center;\">ADD MEMBER<\u002fdiv>\n                <\u002fdiv>\n              <\u002fdiv>\n            <\u002fdiv>\n          <\u002fdiv>\n          \n          <!-- Bottom Row: Integration Settings -->\n          <div style=\"border-top:1px solid rgba(0,0,0,.16);padding-top:36px;flex:none;display:flex;flex-direction:column;gap:24px;\">\n            <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.5);\">\u2014 INTEGRATION SETTINGS<\u002fdiv>\n            \n            <!-- GitHub Database Sync Config -->\n            <div style=\"background:rgba(0,0,0,.02);padding:24px;border:1px solid rgba(0,0,0,.1);\">\n              <div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.6);margin-bottom:12px;\">SHARED GITHUB DATABASE SYNC<\u002fdiv>\n              <p style=\"font-family:var(--font-display);font-size:13px;line-height:1.5;color:rgba(0,0,0,.6);margin-bottom:14px;max-width:680px;\">\n                Use your private GitHub Repository's Issues as your shared database! Enter your GitHub Personal Access Token (PAT) with <code>repo<\u002fcode> permissions and your repository path below. Changes sync live on reload!\n              <\u002fp>\n              <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:16px;\">\n                <div>\n                  <div style=\"font-family:var(--font-mono);font-size:8.5px;color:rgba(0,0,0,.5);margin-bottom:4px;\">GITHUB PERSONAL ACCESS TOKEN (PAT)<\u002fdiv>\n                  <input type=\"password\" value=\"{{ githubPat }}\" onchange=\"{{ onGithubPatChange }}\" placeholder=\"ghp_xxxxxxxxxxxxxxxxxxxx\" style=\"width:100%;font-family:var(--font-mono);font-size:13px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:6px 0;outline:none;background:transparent;color:#000;\">\n                <\u002fdiv>\n                <div>\n                  <div style=\"font-family:var(--font-mono);font-size:8.5px;color:rgba(0,0,0,.5);margin-bottom:4px;\">GITHUB REPOSITORY PATH<\u002fdiv>\n                  <input value=\"{{ githubRepo }}\" onchange=\"{{ onGithubRepoChange }}\" placeholder=\"NuaghtySociety\u002fNS_studio-pm\" style=\"width:100%;font-family:var(--font-mono);font-size:13px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:6px 0;outline:none;background:transparent;color:#000;\">\n                <\u002fdiv>\n              <\u002fdiv>\n              <div onclick=\"{{ saveGithubConfig }}\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;background:#000;color:#fff;cursor:pointer;display:inline-block;\">CONNECT GITHUB DATABASE<\u002fdiv>\n            <\u002fdiv>\n\n            <!-- Supabase Live Sync Config -->\n            <div style=\"background:rgba(0,0,0,.02);padding:24px;border:1px solid rgba(0,0,0,.1);\">\n              <div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.6);margin-bottom:12px;\">SHARED LIVE SYNC DATABASE (SUPABASE)<\u002fdiv>\n              <p style=\"font-family:var(--font-display);font-size:13px;line-height:1.5;color:rgba(0,0,0,.6);margin-bottom:14px;max-width:680px;\">\n                Enter your shared Supabase project credentials below. Once saved, the app will instantly connect to your live database. Any change you or Erik make will immediately update on each other's screens in real-time!\n              <\u002fp>\n              <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:16px;\">\n                <div>\n                  <div style=\"font-family:var(--font-mono);font-size:8.5px;color:rgba(0,0,0,.5);margin-bottom:4px;\">SUPABASE URL<\u002fdiv>\n                  <input value=\"{{ supabaseUrl }}\" onchange=\"{{ onSupabaseUrlChange }}\" placeholder=\"https:\u002f\u002fyour-project.supabase.co\" style=\"width:100%;font-family:var(--font-mono);font-size:13px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:6px 0;outline:none;background:transparent;color:#000;\">\n                <\u002fdiv>\n                <div>\n                  <div style=\"font-family:var(--font-mono);font-size:8.5px;color:rgba(0,0,0,.5);margin-bottom:4px;\">SUPABASE ANON KEY<\u002fdiv>\n                  <input value=\"{{ supabaseKey }}\" onchange=\"{{ onSupabaseKeyChange }}\" placeholder=\"your-anon-key-here\" style=\"width:100%;font-family:var(--font-mono);font-size:13px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:6px 0;outline:none;background:transparent;color:#000;\">\n                <\u002fdiv>\n              <\u002fdiv>\n              <div onclick=\"{{ saveSupabaseConfig }}\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;background:#000;color:#fff;cursor:pointer;display:inline-block;\">CONNECT LIVE SYNC<\u002fdiv>\n            <\u002fdiv>\n            \n            <!-- Google Calendar Config -->\n            <div style=\"background:rgba(0,0,0,.02);padding:24px;border:1px solid rgba(0,0,0,.1);\">\n              <div style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(0,0,0,.6);margin-bottom:12px;\">GOOGLE CALENDAR CLIENT ID<\u002fdiv>\n              <p style=\"font-family:var(--font-display);font-size:13px;line-height:1.5;color:rgba(0,0,0,.6);margin-bottom:14px;max-width:680px;\">\n                To sync your deadlines to Google Calendar, you need to create your own Google OAuth Client ID. \n                Go to the <a href=\"https:\u002f\u002fconsole.cloud.google.com\u002f\" target=\"_blank\" style=\"text-decoration:underline;color:#000;\">Google Cloud Console<\u002fa>, create a project, enable the <strong>Google Calendar API<\u002fstrong>, and create an OAuth Client ID for Web with <strong>Authorized JavaScript Origin<\u002fstrong> set to <code>http:\u002f\u002flocalhost:9000<\u002fcode>.\n              <\u002fp>\n              <input value=\"{{ googleClientId }}\" onchange=\"{{ onGoogleClientIdChange }}\" placeholder=\"e.g. 12345678-abcdef.apps.googleusercontent.com\" style=\"width:100%;font-family:var(--font-mono);font-size:13px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:8px 0;outline:none;background:transparent;color:#000;margin-bottom:16px;\">\n              <div onclick=\"{{ saveGoogleClientId }}\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;background:#000;color:#fff;cursor:pointer;display:inline-block;\">SAVE CLIENT ID<\u002fdiv>\n            <\u002fdiv>\n          <\u002fdiv>\n          \n        <\u002fdiv>\n      <\u002fsc-if>\n\n    <\u002fdiv>\n  <\u002fdiv>\n\n  <!-- ============ GOOGLE CONNECT MODAL ============ -->\n  <sc-if value=\"{{ connectModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeConnectModal }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;\"><\u002fdiv>\n    <div style=\"position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:420px;background:#fff;border:1px solid #000;z-index:70;padding:36px 32px;\">\n      <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(0,0,0,.5);\">\u2014 GOOGLE CALENDAR<\u002fdiv>\n      <div style=\"font-family:var(--font-display);font-weight:700;font-stretch:87.5%;letter-spacing:-0.02em;line-height:1.05;font-size:32px;margin-top:14px;color:#000;\">Connect your<br>calendar.<\u002fdiv>\n      <div style=\"font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:14px;line-height:1.5;color:rgba(0,0,0,.65);margin-top:16px;\">Sign in with your own Google account to sync Studio PM due dates two ways. This is a prototype \u2014 no live account is contacted.<\u002fdiv>\n      <div style=\"margin-top:24px;\">\n        <div style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(0,0,0,.5);\">GOOGLE ACCOUNT EMAIL<\u002fdiv>\n        <input value=\"{{ connectEmailDraft }}\" onchange=\"{{ updateConnectDraft }}\" placeholder=\"you@gmail.com\" style=\"width:100%;font-family:var(--font-display);font-weight:400;font-stretch:100%;font-size:16px;border:0;border-bottom:1px solid rgba(0,0,0,.16);padding:8px 0;margin-top:6px;outline:none;background:transparent;color:#000;\">\n      <\u002fdiv>\n      <div style=\"display:flex;gap:10px;margin-top:28px;\">\n        <div onclick=\"{{ confirmConnect }}\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;background:#000;color:#fff;cursor:pointer;\">ALLOW &amp; CONNECT<\u002fdiv>\n        <div onclick=\"{{ closeConnectModal }}\" style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 18px;border:1px solid rgba(0,0,0,.2);color:rgba(0,0,0,.6);cursor:pointer;\">CANCEL<\u002fdiv>\n      <\u002fdiv>\n    <\u002fdiv>\n  <\u002fsc-if>\n\n  <!-- ============ TASK DETAIL PANEL ============ -->\n  <sc-if value=\"{{ hasSelectedTask }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closePanel }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.04);z-index:40;\"><\u002fdiv>\n    <div style=\"position:fixed;top:0;right:0;bottom:0;width:460px;background:#fff;border-left:1px solid rgba(0,0,0,.4);z-index:50;overflow-y:auto;animation:panelIn 220ms cubic-bezier(0.2,0.7,0.2,1);box-shadow:-10px 0 28px rgba(0,0,0,.08);\">\n      <div style=\"padding:32px 32px 48px;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;\">\n          <div style=\"display:flex;align-items:flex-start;gap:8px;max-width:340px;\">\n 'background:rgba(0,0,0,.02);border-right:1px solid #000;border-bottom:1px solid #000;min-height:110px;' });\n    }\n\n    for (let day = 1; day <= daysInMonth; day++) {\n      const iso = year + '-' + pad2(month + 1) + '-' + pad2(day);\n      const dayTasks = calTasks.filter(function (t) { return t.dueDate === iso; }).map(t => {\n        const proj = state.projects.find(p => p.id === t.projectId) || { color: '#999' };\n        return {\n          label: t.title,\n          chipStyle: 'font-family:var(--font-mono);font-size:8px;padding:3px 6px;margin-top:4px;color:#fff;background:' + proj.color + ';cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;',\n          onClick: () => this.selectTask(t.id)\n        };\n      });\n\n      const isToday = iso === TODAY_ISO;\n      const cellStyle = 'padding:8px;border-right:1px solid #000;border-bottom:1px solid #000;min-height:110px;vertical-align:top;' + (isToday ? 'background:rgba(0,0,0,.03);' : '');\n      const dayNumStyle = 'font-family:var(--font-mono);font-size:10px;font-weight:700;' + (isToday ? 'border-bottom:2px solid #000;padding-bottom:1px;display:inline-block;' : 'color:rgba(0,0,0,.4);');\n\n      currentWeek.push({\n        notBlank: true,\n        day: day,\n        tasks: dayTasks,\n        style: cellStyle,\n        dayNumStyle: dayNumStyle\n      });\n\n      if (currentWeek.length === 7) {\n        calendarWeeks.push(currentWeek);\n        currentWeek = [];\n      }\n    }\n\n    if (currentWeek.length > 0) {\n      while (currentWeek.length < 7) {\n        currentWeek.push({ notBlank: false, style: 'background:rgba(0,0,0,.02);border-right:1px solid #000;border-bottom:1px solid #000;min-height:110px;' });\n      }\n      calendarWeeks.push(currentWeek);\n    }\n\n    const calendarMonthLabel = MONTH_NAMES[month] + ' ' + year;\n\n    return {\n      railIsDark: railIsDark,\n      railIsLight: !railIsDark,\n      showCategoryGrouping: showCategoryGrouping,\n      navItems: navItems,\n nSupabaseUrlChange,\n      onSupabaseKeyChange: this.onSupabaseKeyChange,\n      saveSupabaseConfig: this.saveSupabaseConfig,\n      githubPat: state.githubPat,\n      githubRepo: state.githubRepo,\n      onGithubPatChange: this.onGithubPatChange,\n      onGithubRepoChange: this.onGithubRepoChange,\n      saveGithubConfig: this.saveGithubConfig\n    };\n  }\n}\n\n<\u002fscript>\n\n\n<\u002fdiv><\u002fsc-if><\u002fx-dc><\u002fbody><\u002fhtml>"</script>
